<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Голосовая диктовка</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    textarea { width: 100%; height: 320px; font-size: 16px; padding: 10px; }
    button { margin-right: 10px; margin-top: 10px; padding: 10px 18px; font-size: 15px; }
    .status { margin-top: 12px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Голосовая диктовка</h1>
  <p>Нажми «Начать диктовку», говори по-русски, затем скопируй текст в VS Code.</p>
  <button id="start">Начать диктовку</button>
  <button id="stop" disabled>Остановить</button>
  <button id="clear">Очистить</button>
  <button id="copy">Копировать</button>
  <textarea id="text"></textarea>
  <div class="status" id="status">Готово</div>

  <script>
    const status = document.getElementById('status');
    const text = document.getElementById('text');
    const start = document.getElementById('start');
    const stop = document.getElementById('stop');
    const clear = document.getElementById('clear');
    const copy = document.getElementById('copy');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      status.textContent = 'Ваш браузер не поддерживает Web Speech API. Используйте Google Chrome или новый Microsoft Edge.';
      start.disabled = true;
    }

    const recorder = SpeechRecognition ? new SpeechRecognition() : null;
    if (recorder) {
      recorder.lang = 'ru-RU';
      recorder.interimResults = true;
      recorder.continuous = true;

      recorder.onresult = event => {
        let interim = '';
        let final = text.value;
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            final += transcript + '\n';
          } else {
            interim += transcript;
          }
        }
        text.value = final + interim;
      };

      recorder.onerror = event => {
        status.textContent = 'Ошибка распознавания: ' + event.error;
      };

      recorder.onstart = () => {
        status.textContent = 'Идёт диктовка...';
        start.disabled = true;
        stop.disabled = false;
      };

      recorder.onend = () => {
        status.textContent = 'Диктовка остановлена';
        start.disabled = false;
        stop.disabled = true;
      };
    }

    start.addEventListener('click', () => {
      if (recorder) {
        text.focus();
        recorder.start();
      }
    });
    stop.addEventListener('click', () => {
      if (recorder) recorder.stop();
    });
    clear.addEventListener('click', () => { text.value = ''; status.textContent = 'Текст очищен'; });
    copy.addEventListener('click', () => {
      text.select();
      document.execCommand('copy');
      status.textContent = 'Текст скопирован';
    });
  </script>
</body>
</html>
